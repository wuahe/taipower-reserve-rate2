<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>台電供電餘裕率</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="dashboard">
      <header class="header">
        <div>
          <p class="eyebrow">Taipower Reserve</p>
          <h1>台電供電餘裕率</h1>
        </div>
        <div class="header-actions">
          <a class="source-link" href="https://www.taipower.com.tw/2289/2363/2367/2368/10262/normalPost" target="_blank" rel="noopener noreferrer">台電今日電力資訊</a>
          <label class="date-control">
            <span>日期</span>
            <input id="date-picker" type="date" />
          </label>
          <span id="status-pill" class="status-pill">讀取中</span>
          <button id="refresh-now" class="icon-button" type="button" title="立即刷新" aria-label="立即刷新">↻</button>
        </div>
      </header>

      <section class="summary-cards" aria-label="日期統計">
        <article class="summary-card primary">
          <span class="title">最新供電餘裕率</span>
          <strong id="current-rate">--</strong>
        </article>
        <article class="summary-card">
          <span class="title">即時負載</span>
          <strong id="load-mw">--</strong>
        </article>
        <article class="summary-card">
          <span class="title">供電能力</span>
          <strong id="supply-mw">--</strong>
        </article>
        <article class="summary-card">
          <span class="title">備轉容量</span>
          <strong id="reserve-mw">--</strong>
        </article>
      </section>

      <section class="meta-cards" aria-label="今日統計">
        <article class="meta-card">
          <span class="label">最高</span>
          <strong id="high-rate">--</strong>
        </article>
        <article class="meta-card">
          <span class="label">最低</span>
          <strong id="low-rate">--</strong>
        </article>
        <article class="meta-card">
          <span class="label">平均</span>
          <strong id="avg-rate">--</strong>
        </article>
        <article class="meta-card">
          <span class="label">筆數</span>
          <strong id="point-count">--</strong>
        </article>
        <article class="meta-card">
          <span class="label">最後更新</span>
          <strong id="updated-at">--</strong>
        </article>
      </section>

      <section class="chart-shell" aria-label="整天供電餘裕率曲線">
        <div class="chart-head">
          <div class="legend">
            <span class="legend-item"><i class="dot blue"></i>供電餘裕率</span>
            <span class="legend-item"><i class="dot green"></i>即時負載</span>
            <span class="legend-item"><i class="dot yellow"></i>供電能力</span>
          </div>
          <span id="fetch-status" class="chart-status">讀取中</span>
        </div>
        <div class="canvas-wrap">
          <canvas id="reserve-chart"></canvas>
          <div id="chart-tooltip" class="chart-tooltip" hidden></div>
          <div id="empty-state" class="empty-state">等待第一筆成功資料</div>
        </div>
      </section>
    </main>
    <script type="module" src="/client.js"></script>
  </body>
</html>
